# Production Docker Compose
# Usage: docker compose -f docker-compose.prod.yml up -d
#
# Prerequisites:
#   1. Create .env.production file (see Backend/.env.example)
#   2. Ensure ports 80/443 are available
#   3. Set up SSL/TLS (use reverse proxy like Caddy or Traefik)

services:
  backend:
    build:
      context: .
      dockerfile: Backend/Dockerfile
    image: ghcr.io/your-org/resume-builder-backend:${TAG:-latest}
    container_name: resume-backend
    restart: always
    expose:
      - "5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGO_URI=${MONGO_URI}
      - REDIS_URL=redis://redis:6379/0
      - FRONTEND_URL=${FRONTEND_URL}
      - FRONTEND_URLS=${FRONTEND_URLS}
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - JWT_ACCESS_PUBLIC_KEY=${JWT_ACCESS_PUBLIC_KEY}
      - JWT_ACCESS_PRIVATE_KEY=${JWT_ACCESS_PRIVATE_KEY}
      - JWT_REFRESH_PUBLIC_KEY=${JWT_REFRESH_PUBLIC_KEY}
      - JWT_REFRESH_PRIVATE_KEY=${JWT_REFRESH_PRIVATE_KEY}
      - EMAIL_PROVIDER=${EMAIL_PROVIDER:-brevo}
      - BREVO_API_KEY=${BREVO_API_KEY}
      - BREVO_FROM=${BREVO_FROM}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - AI_PROVIDER=${AI_PROVIDER:-gemini}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - ALLOW_PREVIEW_ORIGINS=false
      - USE_MEMORY_ONLY_CACHE=false
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - ENABLE_METRICS=${ENABLE_METRICS:-true}
      - METRICS_PATH=/metrics
      - OTEL_EXPORTER_OTLP_TRACES_ENDPOINT=${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT}
      - OTEL_EXPORTER_OTLP_METRICS_ENDPOINT=${OTEL_EXPORTER_OTLP_METRICS_ENDPOINT}
      - GRAFANA_OTLP_ENDPOINT=${GRAFANA_OTLP_ENDPOINT}
      - GRAFANA_API_TOKEN=${GRAFANA_API_TOKEN}
      - GRAFANA_LOKI_URL=${GRAFANA_LOKI_URL}
      - LOKI_INSTANCE_ID=${LOKI_INSTANCE_ID}
      - OTEL_INSTANCE_ID=${OTEL_INSTANCE_ID}
      - CREATE_INDEXES_ON_STARTUP=true
      - CORS_EXTRA_PATTERNS=${CORS_EXTRA_PATTERNS}
    volumes:
      - backend_cache:/app/.cache
    networks:
      - app-network
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5000/health',r=>{process.exit(r.statusCode===200?0:1)}).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1.5G
        reservations:
          cpus: "0.5"
          memory: 512M
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
      - /app/.cache/puppeteer

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE_URL=/api
        - VITE_BASE_URL=
        - VITE_GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
    image: ghcr.io/your-org/resume-builder-frontend:${TAG:-latest}
    container_name: resume-frontend
    restart: always
    expose:
      - "80"
    networks:
      - app-network
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
        reservations:
          cpus: "0.1"
          memory: 64M
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
      - /var/cache/nginx
      - /var/run

  mongo:
    image: mongo:7.0
    container_name: resume-mongo
    restart: always
    expose:
      - "27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - app-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 256M
    security_opt:
      - no-new-privileges:true

  redis:
    image: redis:7-alpine
    container_name: resume-redis
    restart: always
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 64M
    security_opt:
      - no-new-privileges:true

networks:
  app-network:
    driver: bridge

volumes:
  mongo_data:
    name: resume_mongo_data
  redis_data:
    name: resume_redis_data
  backend_cache:
    name: resume_backend_cache
