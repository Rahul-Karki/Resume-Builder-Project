server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "0" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Proxy API requests to backend container
    location /api/ {
        proxy_pass http://backend:5000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Cookie $http_cookie;
        proxy_pass_header Set-Cookie;
    }

    # Critical for React Router - prevents 404 on refresh
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static JS/CSS assets aggressively with CDN-friendly headers
    location ~* \.(js|css)$ {
        expires 1y;
        add_header Cache-Control "public, immutable, no-transform";
        add_header CDN-Cache-Control "public, max-age=31536000";
        # Enable CDN compression
        gzip on;
        gzip_types application/javascript text/css;
    }

    # Optimized image serving with CDN headers
    location ~* \.(png|jpg|jpeg|gif|ico|svg|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable, no-transform";
        add_header CDN-Cache-Control "public, max-age=31536000";
        # Enable image optimization CDN hints
        add_header Accept-Encoding "gzip";
        # Disable off for images that should not be compressed via gzip
        gzip off;
        access_log off;
    }

    # Font files
    location ~* \.(woff|woff2|eot|ttf|otf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable, no-transform";
        add_header CDN-Cache-Control "public, max-age=31536000";
        access_log off;
    }

    # Disable caching for HTML to ensure fresh content
    location ~* \.(html)$ {
        add_header Cache-Control "no-cache, must-revalidate";
    }
}