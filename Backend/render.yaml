services:
  - type: web
    name: resume-builder-backend
    runtime: node
    plan: free
    buildCommand: npm install && npx puppeteer browsers install chrome && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGO_URI
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: FRONTEND_URLS
        sync: false
      - key: ALLOW_PREVIEW_ORIGINS
        value: "false"
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: LOG_LEVEL
        value: info
      - key: SERVICE_NAME
        value: resume-builder-backend
      - key: SERVICE_VERSION
        value: 1.0.0
      - key: SENTRY_DSN
        sync: false
      - key: SENTRY_ENVIRONMENT
        value: production
      - key: SENTRY_TRACES_SAMPLE_RATE
        value: 0.1
      - key: ENABLE_METRICS
        value: "true"
      - key: METRICS_PATH
        value: /metrics
      - key: REDIS_URL
        sync: false
      - key: UPSTASH_REDIS_REST_URL
        sync: false
      - key: UPSTASH_REDIS_REST_TOKEN
        sync: false
      - key: REDIS_CONNECT_TIMEOUT_MS
        value: 5000
      - key: REDIS_CACHE_TTL_SECONDS
        value: 300
      - key: REDIS_RATE_LIMIT_WINDOW_MS
        value: 900000
      - key: REDIS_RATE_LIMIT_MAX
        value: 100
      - key: BULLMQ_REDIS_URL
        sync: false
      - key: RESUME_DOWNLOAD_QUEUE_PREFIX
        value: resume-builder
      - key: RESUME_DOWNLOAD_WORKER_CONCURRENCY
        value: 2
      - key: RESUME_DOWNLOAD_JOB_ATTEMPTS
        value: 5
      - key: RESUME_DOWNLOAD_BACKOFF_DELAY_MS
        value: 5000
      - key: RESUME_DOWNLOAD_STALE_PENDING_MS
        value: 900000
      # Do NOT set PUPPETEER_EXECUTABLE_PATH. Puppeteer's build command (npx puppeteer browsers install chrome)
      # installs Chromium to node_modules/puppeteer-core/.local-chromium/ and auto-detects it.
      # Overriding with a custom path like /usr/bin/chromium will fail unless Chromium is installed there.
