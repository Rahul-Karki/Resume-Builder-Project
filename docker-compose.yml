# Development Docker Compose
# Usage: docker compose up --build
# For production, use: docker compose -f docker-compose.prod.yml up -d

services:
  backend:
    build:
      context: .
      dockerfile: Backend/Dockerfile
    container_name: resume-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - ./Backend/.env
    environment:
      - NODE_ENV=development
      - REDIS_URL=redis://redis:6379/0
      - MONGO_URI=mongodb://mongo:27017/resume_builder_dev
      - FRONTEND_URL=http://localhost:5173
      - FRONTEND_URLS=http://localhost:5173,http://localhost:5000
      - ALLOW_PREVIEW_ORIGINS=true
      - USE_MEMORY_ONLY_CACHE=false
    volumes:
      - backend_node_modules:/app/node_modules
      - backend_cache:/app/.cache
    networks:
      - app-network
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:5000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE_URL=/api
        - VITE_BASE_URL=
        - VITE_GOOGLE_CLIENT_ID=
    container_name: resume-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    networks:
      - app-network
    depends_on:
      backend:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M

  mongo:
    image: mongo:7.0
    container_name: resume-mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    networks:
      - app-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

  redis:
    image: redis:7-alpine
    container_name: resume-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - redis_data:/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M

networks:
  app-network:
    driver: bridge

volumes:
  mongo_data:
    name: resume_mongo_data
  redis_data:
    name: resume_redis_data
  backend_node_modules:
  backend_cache:
