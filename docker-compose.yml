services:
  backend:
    build:
      context: .
      dockerfile: Backend/Dockerfile
    container_name: backend2
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - ./Backend/.env
    environment:
      - NODE_ENV=production
      - REDIS_URL=redis://redis:6379/0
      - BULLMQ_REDIS_URL=redis://redis:6379/0
    networks:
      - app-network
    depends_on:
      - mongo
      - redis
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend2
    restart: unless-stopped
    ports:
      - "5173:80"      # nginx serves on 80, not 5173
    networks:
      - app-network
    depends_on:
      - backend

  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
    container_name: worker2
    restart: unless-stopped
    env_file:
      - ./worker/.env
    environment:
      - NODE_ENV=production
      - MONGO_URI=mongodb://mongo:27017/resume_builder
      - BULLMQ_REDIS_URL=redis://redis:6379/0
      - PUPPETEER_EXECUTABLE_PATH=/usr/bin/chromium
    networks:
      - app-network
    depends_on:
      - mongo
      - redis

  mongo:
    image: mongo:7
    container_name: mongo2
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    networks:
      - app-network

  redis:
    image: redis:7-alpine
    container_name: redis2
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  mongo_data:
  redis_data: