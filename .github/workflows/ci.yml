name: CI Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secrets-scan:
    timeout-minutes: 5
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Secret scanning with Gitleaks
      uses: gitleaks/gitleaks-action@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  test-backend:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./Backend
    services:
      mongodb:
        image: mongo:7.0
        ports:
          - 27017:27017
      redis:
        image: redis:7.0-alpine
        ports:
          - 6379:6379
    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        cache-dependency-path: './Backend/package-lock.json'
    - run: npm ci
    - name: npm audit (fail on moderate+)
      run: npm audit --audit-level=moderate
    - name: Lint (ESLint)
      run: npx eslint . --ext .ts --no-error-on-unmatched-pattern
    - name: Type Check
      run: npx tsc --noEmit
    - name: Run Build
      run: npm run build
    - name: Run Automated Tests (node:test)
      env:
        NODE_ENV: test
        PORT: 5000
        MONGO_URI: mongodb://localhost:27017/test-db
        REDIS_URL: redis://localhost:6379
        JWT_ACCESS_SECRET: test-access-secret
        JWT_REFRESH_SECRET: test-refresh-secret
        FRONTEND_URL: http://localhost:5173
      run: npm test
    - name: Run Vitest Unit Tests with Coverage
      env:
        NODE_ENV: test
        JWT_ACCESS_SECRET: test-access-secret
        JWT_REFRESH_SECRET: test-refresh-secret
        FRONTEND_URL: http://localhost:5173
      run: npx vitest run --coverage

  test-frontend:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        cache-dependency-path: './frontend/package-lock.json'
    - run: npm ci
    - name: npm audit (fail on moderate+)
      run: npm audit --audit-level=moderate
    - name: Lint
      run: npm run lint
    - name: Type Check
      run: npx tsc --noEmit
    - name: Build
      run: npm run build
    - name: Run Unit Tests
      run: npm run test

  test-e2e:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    services:
      mongodb:
        image: mongo:7.0
        ports:
          - 27017:27017
      redis:
        image: redis:7.0-alpine
        ports:
          - 6379:6379
    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        cache-dependency-path: './frontend/package-lock.json'
    - run: npm ci
    - name: Build backend for E2E
      working-directory: ./Backend
      run: npm run build
    - name: Start backend server
      working-directory: ./Backend
      env:
        NODE_ENV: test
        PORT: 5000
        MONGO_URI: mongodb://localhost:27017/e2e-db
        REDIS_URL: redis://localhost:6379
        JWT_ACCESS_SECRET: e2e-access-secret
        JWT_REFRESH_SECRET: e2e-refresh-secret
        FRONTEND_URL: http://localhost:5173
      run: node dist/Backend/src/server.js &
    - name: Run Playwright E2E tests
      env:
        CI: true
      run: npx playwright install --with-deps && npx playwright test

  docker-build:
    if: github.ref == 'refs/heads/main'
    needs: [secrets-scan, test-backend, test-frontend, test-e2e]
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata for backend
      id: meta-backend
      uses: docker/metadata-action@v5
      with:
        images: ghcr.io/${{ github.repository }}/backend
        tags: |
          type=sha,prefix=,suffix=,format=short
          type=ref,event=branch
          type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

    - name: Build and push backend
      uses: docker/build-push-action@v6
      with:
        context: .
        file: Backend/Dockerfile
        push: true
        tags: ${{ steps.meta-backend.outputs.tags }}
        labels: ${{ steps.meta-backend.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Run Trivy vulnerability scan on backend image
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: ${{ steps.meta-backend.outputs.tags }}
        format: sarif
        output: trivy-backend.sarif
        severity: HIGH,CRITICAL
        exit-code: 1
      continue-on-error: true

    - name: Upload Trivy backend results to GitHub
      uses: github/codeql-action/upload-sarif@v3
      if: always()
      with:
        sarif_file: trivy-backend.sarif

    - name: Extract metadata for frontend
      id: meta-frontend
      uses: docker/metadata-action@v5
      with:
        images: ghcr.io/${{ github.repository }}/frontend
        tags: |
          type=sha,prefix=,suffix=,format=short
          type=ref,event=branch
          type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

    - name: Build and push frontend
      uses: docker/build-push-action@v6
      with:
        context: frontend
        file: frontend/Dockerfile
        push: true
        tags: ${{ steps.meta-frontend.outputs.tags }}
        labels: ${{ steps.meta-frontend.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        build-args: |
          VITE_API_BASE_URL=/api
          VITE_BASE_URL=
          # Set via GitHub Actions secrets: secrets.GOOGLE_CLIENT_ID
          VITE_GOOGLE_CLIENT_ID=

    - name: Run Trivy vulnerability scan on frontend image
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: ${{ steps.meta-frontend.outputs.tags }}
        format: sarif
        output: trivy-frontend.sarif
        severity: HIGH,CRITICAL
        exit-code: 1
      continue-on-error: true

    - name: Upload Trivy frontend results to GitHub
      uses: github/codeql-action/upload-sarif@v3
      if: always()
      with:
        sarif_file: trivy-frontend.sarif
